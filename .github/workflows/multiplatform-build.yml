name: Multi-Platform Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            binary: azcopy-linux-amd64
          - os: darwin
            arch: arm64
            runner: macos-latest
            binary: azcopy-macos-arm64
          - os: windows
            arch: amd64
            runner: windows-latest
            binary: azcopy-windows-amd64.exe

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run tests
      run: go test -v ./...

    - name: Build binary
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 0
      run: |
        go build -ldflags "-s -w -extldflags '-static'" -o ${{ matrix.binary }}

    - name: Create build info
      shell: bash
      run: |
        echo "Build Information" > build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "==================" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "OS: ${{ matrix.os }}" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "Architecture: ${{ matrix.arch }}" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "Go Version: $(go version)" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "Build Time: $(date -u)" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "Commit: ${{ github.sha }}" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "Branch: ${{ github.ref_name }}" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        echo "Binary Size:" >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        ls -lh ${{ matrix.binary }} >> build-info-${{ matrix.os }}-${{ matrix.arch }}.txt

    - name: Test binary (non-Windows)
      if: matrix.os != 'windows'
      run: ./${{ matrix.binary }} --version || true

    - name: Test binary (Windows)
      if: matrix.os == 'windows'
      run: .\${{ matrix.binary }} --version || echo "Binary test completed"
      shell: powershell

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: azcopy-${{ matrix.os }}-${{ matrix.arch }}
        path: |
          ${{ matrix.binary }}
          build-info-${{ matrix.os }}-${{ matrix.arch }}.txt
        retention-days: 30

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create release archives
      run: |
        # Create archives for each platform
        cd azcopy-linux-amd64
        tar -czf ../azcopy-linux-amd64.tar.gz *
        cd ..
        
        cd azcopy-darwin-arm64
        tar -czf ../azcopy-macos-arm64.tar.gz *
        cd ..
        
        cd azcopy-windows-amd64
        zip -r ../azcopy-windows-amd64.zip *
        cd ..

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          azcopy-linux-amd64.tar.gz
          azcopy-macos-arm64.tar.gz
          azcopy-windows-amd64.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      if: needs.build.result == 'success'

    - name: Generate build summary
      if: needs.build.result == 'success'
      run: |
        echo "# azcopy Multi-Platform Build Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Build Status: ✅ Success" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Architecture | Status | Binary |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------------|---------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Linux | amd64 | ✅ | azcopy-linux-amd64 |" >> $GITHUB_STEP_SUMMARY
        echo "| macOS | arm64 | ✅ | azcopy-macos-arm64 |" >> $GITHUB_STEP_SUMMARY
        echo "| Windows | amd64 | ✅ | azcopy-windows-amd64.exe |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Features" >> $GITHUB_STEP_SUMMARY
        echo "- 🔒 **Process-level locking** for Unix/Linux/macOS" >> $GITHUB_STEP_SUMMARY
        echo "- 🔄 **Thread-level synchronization** for Windows" >> $GITHUB_STEP_SUMMARY
        echo "- 🚀 **Concurrent process safety**" >> $GITHUB_STEP_SUMMARY
        echo "- 📁 **Job plan file protection**" >> $GITHUB_STEP_SUMMARY
        echo "- 🧹 **Automatic cleanup on exit**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Build Information" >> $GITHUB_STEP_SUMMARY
        for dir in azcopy-*/; do
          if [ -d "$dir" ]; then
            echo "### ${dir%/}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "$dir"/*.txt 2>/dev/null || echo "Build info not available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
        done

    - name: Generate failure summary
      if: needs.build.result != 'success'
      run: |
        echo "# azcopy Multi-Platform Build Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Build Status: ❌ Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "One or more platform builds failed. Please check the build logs for details." >> $GITHUB_STEP_SUMMARY